<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Sense Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h2 class="logo">Omni<span>Sense</span></h2>
            <nav>
                <ul>
                    <li class="active">Performance</li>
                    <li>Reports</li>
                    <li>Settings</li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header class="header">
                <h1>System Overview</h1>
                <input type="text" class="search-bar" placeholder="Search data points...">
            </header>

            <section class="data-grid">
                <div class="card skeleton">
                    <div class="skeleton-shimmer"></div>
                    <div class="line title"></div>
                    <div class="line text"></div>
                    <div class="line btn"></div>
                </div>

                <article class="card data-card">
                    <div class="card-header">
                        <span class="status">Live</span>
                        <h3>Server Latency</h3>
                    </div>
                    <div class="card-body">
                        <p class="value">24<span>ms</span></p>
                    </div>
                    <button class="card-btn">Run Diagnostics</button>
                </article>

                <article class="card data-card">
                    <div class="card-header">
                        <span class="status">Live</span>
                        <h3>Uptime</h3>
                    </div>
                    <div class="card-body">
                        <p class="value">99.9<span>%</span></p>
                    </div>
                    <button class="card-btn">View Log</button>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
